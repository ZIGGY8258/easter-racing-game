<!DOCTYPE html>
<html>
<head>
<title>Easter Racing Online</title>
<style>
body{text-align:center;font-family:Arial;background:#87ceeb;}
canvas{border:4px solid black;display:block;margin:auto;}
</style>
</head>
<body>

<h1>🐰 Easter Racing 🏁</h1>

Name: <input id="name">
<button onclick="start()">Start</button>

<canvas id="game" width="900" height="500"></canvas>

<script>
let c=document.getElementById("game"),ctx=c.getContext("2d")
let p,x=50,y=200,s=2,l=0,keys={}
document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function start(){
p=document.getElementById("name").value||"Player"
l=0;x=50;y=200;s=2
}

function update(){
if(keys["ArrowUp"])s+=0.1
if(keys["ArrowDown"])s*=0.98
if(keys["Shift"])s+=2
x+=s
if(x>800){x=50;l++}
}

function draw(){
ctx.fillStyle="#7cfc00"
ctx.fillRect(0,0,900,500)
ctx.fillStyle="#555"
ctx.fillRect(0,150,900,200)
ctx.font="30px Arial"
ctx.fillText("🐰",x,y)
ctx.fillText("Lap: "+l+"/3",20,40)
}

function loop(){
update();draw();requestAnimationFrame(loop)
}
loop()
</script>

</body>
</html>
